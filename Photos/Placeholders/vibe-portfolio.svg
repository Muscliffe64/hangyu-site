<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf6"/>
      <stop offset="100%" stop-color="#ece6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#paper)"/>
  <!-- 浏览器外壳 -->
  <g>
    <rect x="120" y="100" width="960" height="560" rx="10" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="120" y="100" width="960" height="46" rx="10" fill="#1a1a1a"/>
    <circle cx="148" cy="123" r="7" fill="#e57d6a"/>
    <circle cx="172" cy="123" r="7" fill="#e3c46a"/>
    <circle cx="196" cy="123" r="7" fill="#7fb27a"/>
    <rect x="230" y="112" width="540" height="22" rx="11" fill="#3a3a3a"/>
    <text x="252" y="128" font-family="Menlo, monospace" font-size="13" fill="#c9c0a9" letter-spacing="0.08em">hangyu.dev</text>
  </g>
  <!-- 页面内容：作品集网格 -->
  <g>
    <!-- 导航 -->
    <text x="160" y="200" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#1a1a1a" letter-spacing="0.2em">HANGYU</text>
    <g font-family="'Songti SC', serif" font-size="13" fill="#4a4a4a">
      <text x="650" y="200">首页</text>
      <text x="710" y="200">摄影</text>
      <text x="770" y="200">影像</text>
      <text x="830" y="200">文字</text>
      <text x="890" y="200">积木</text>
      <text x="950" y="200">关于</text>
    </g>
    <line x1="160" y1="222" x2="1040" y2="222" stroke="#e4e4e4" stroke-width="1"/>
    <!-- 4 张作品占位 -->
    <g>
      <rect x="160" y="260" width="200" height="270" fill="#6b5a3e"/>
      <rect x="380" y="260" width="200" height="270" fill="#3a4a55"/>
      <rect x="600" y="260" width="200" height="270" fill="#7a3a28"/>
      <rect x="820" y="260" width="200" height="270" fill="#2a3a2a"/>
    </g>
    <!-- 影像列表占位 -->
    <line x1="160" y1="570" x2="1040" y2="570" stroke="#e4e4e4"/>
    <rect x="160" y="590" width="220" height="50" fill="#1a1410"/>
    <rect x="400" y="590" width="180" height="14" fill="#3a3a3a"/>
    <rect x="400" y="614" width="120" height="10" fill="#8a8a8a"/>
    <rect x="400" y="632" width="540" height="6" fill="#cccccc"/>
  </g>
  <!-- 标签 -->
  <g font-family="Georgia, 'Songti SC', serif">
    <text x="60" y="720" font-size="22" font-style="italic" fill="#8b3a1e" letter-spacing="0.15em">Hangyu.dev — Personal Portfolio</text>
  </g>
</svg>
