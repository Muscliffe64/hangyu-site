<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1814"/>
      <stop offset="60%" stop-color="#3a2c20"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <radialGradient id="grain" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%" stop-color="#5a4a36" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grain)"/>
  <!-- 4:3 取景框 -->
  <rect x="220" y="120" width="1160" height="660" fill="none" stroke="#d8c7a7" stroke-width="2" opacity="0.55"/>
  <!-- 取景框四角 -->
  <g stroke="#d8c7a7" stroke-width="4" fill="none" opacity="0.9">
    <path d="M220,170 L220,120 L270,120"/>
    <path d="M1330,120 L1380,120 L1380,170"/>
    <path d="M220,730 L220,780 L270,780"/>
    <path d="M1330,780 L1380,780 L1380,730"/>
  </g>
  <!-- 中央圆形播放按钮（虚线，强调"未到位"） -->
  <circle cx="800" cy="430" r="78" fill="none" stroke="#fdf9ef" stroke-width="2" stroke-dasharray="6 8" opacity="0.7"/>
  <polygon points="780,395 780,465 845,430" fill="#fdf9ef" opacity="0.85"/>
  <!-- 文字 -->
  <g fill="#fdf9ef" font-family="Georgia, 'Songti SC', serif" text-anchor="middle">
    <text x="800" y="600" font-size="38" letter-spacing="0.1em" opacity="0.92">影 片 整 理 中</text>
    <text x="800" y="650" font-size="20" font-style="italic" letter-spacing="0.18em" opacity="0.55">Film coming soon</text>
  </g>
</svg>
