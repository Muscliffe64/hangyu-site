<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="750" fill="#fafaf6"/>
  <!-- 主视图 -->
  <rect x="80" y="80" width="700" height="590" fill="#ece6d4" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 假封面图（被裁剪的样子） -->
  <g>
    <rect x="80" y="80" width="700" height="590" fill="#3a4a55"/>
    <!-- 远山 -->
    <path d="M80,400 L200,330 L350,380 L520,310 L680,360 L780,330 L780,670 L80,670 Z" fill="#2b3a44"/>
    <!-- 水面 -->
    <rect x="80" y="540" width="700" height="130" fill="#1f2c35"/>
    <!-- 太阳 -->
    <circle cx="540" cy="280" r="44" fill="#e3b264"/>
  </g>
  <!-- 当前裁剪框 -->
  <rect x="180" y="220" width="500" height="220" fill="none" stroke="#fdf9ef" stroke-width="3"/>
  <!-- 中心十字 -->
  <g stroke="#fdf9ef" stroke-width="2" opacity="0.7">
    <line x1="430" y1="320" x2="430" y2="340"/>
    <line x1="420" y1="330" x2="440" y2="330"/>
  </g>
  <!-- 4 角拖手 -->
  <g fill="#fdf9ef">
    <circle cx="180" cy="220" r="6"/>
    <circle cx="680" cy="220" r="6"/>
    <circle cx="180" cy="440" r="6"/>
    <circle cx="680" cy="440" r="6"/>
  </g>
  <!-- 右侧控制面板 -->
  <g>
    <rect x="820" y="80" width="300" height="590" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="844" y="120" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#1a1a1a">Cover Editor</text>
    <line x1="844" y1="140" x2="1096" y2="140" stroke="#e4e4e4"/>
    <text x="844" y="180" font-family="'Songti SC', serif" font-size="13" fill="#4a4a4a">文章</text>
    <rect x="844" y="195" width="252" height="28" fill="#f4f4f4"/>
    <text x="854" y="214" font-family="'Songti SC', serif" font-size="12" fill="#1a1a1a">一棵杨树.html</text>
    <text x="844" y="260" font-family="'Songti SC', serif" font-size="13" fill="#4a4a4a">焦点 X</text>
    <rect x="844" y="275" width="252" height="6" fill="#e4e4e4"/>
    <rect x="844" y="275" width="155" height="6" fill="#8b3a1e"/>
    <text x="844" y="320" font-family="'Songti SC', serif" font-size="13" fill="#4a4a4a">焦点 Y</text>
    <rect x="844" y="335" width="252" height="6" fill="#e4e4e4"/>
    <rect x="844" y="335" width="88" height="6" fill="#8b3a1e"/>
    <rect x="844" y="400" width="252" height="40" fill="#1a1a1a"/>
    <text x="924" y="425" font-family="'Songti SC', serif" font-size="13" fill="#ffffff">保 存 位 置</text>
    <text x="844" y="500" font-family="'Songti SC', serif" font-size="11" fill="#8a8a8a">JSON · 24 / 24</text>
  </g>
  <!-- 标题 -->
  <g font-family="Georgia, 'Songti SC', serif">
    <text x="60" y="720" font-size="22" font-style="italic" fill="#8b3a1e" letter-spacing="0.15em">Cover Editor — 给文章选封面位置的小工具</text>
  </g>
</svg>
